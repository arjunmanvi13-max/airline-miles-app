<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Vantara</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <main class="popup">
      <header class="hero">
        <p class="eyebrow">Award travel intelligence</p>
        <h1>Vantara</h1>
        <p class="subtitle">
          Analyze an award flight before you transfer points.
        </p>
      </header>

     <section class="card walletCard">
  <div class="sectionHeader">
    <div>
      <h2>Wallet</h2>
      <p id="walletPreview" class="walletPreview">No wallet saved yet</p>
    </div>

    <button id="editWallet" class="smallButton" type="button">
      Add
    </button>
  </div>

  <div id="walletList" class="walletList"></div>

  <div id="walletForm" class="walletForm hidden">
    <label>
      Card
      <select id="card">
        <option value="Amex">Amex</option>
        <option value="Chase">Chase</option>
        <option value="Capital One">Capital One</option>
        <option value="Bilt">Bilt</option>
        <option value="Citi">Citi</option>
        <option value="Wells Fargo">Wells Fargo</option>
      </select>
    </label>

    <label>
      Balance
      <input id="balance" placeholder="ex: 120000" />
    </label>

    <button id="saveWallet">Add card to wallet</button>
    <p id="walletStatus" class="status"></p>
  </div>
</section>

      <section class="card">
        <h2>Screenshot</h2>

        <label class="uploadBox">
          <span id="fileLabel">Choose screenshot</span>
          <small>Best results include route, date, miles, taxes, and flight details.</small>
          <input id="screenshot" type="file" accept="image/*" />
        </label>

        <button id="analyze">Analyze redemption</button>
        <p id="status" class="status"></p>
      </section>

      <section id="result" class="result hidden"></section>

      <section id="overridePanel" class="card hidden">
  <div class="sectionHeader">
    <div>
      <h2>Review details</h2>
      <p class="walletPreview">Override anything Vantara extracted incorrectly.</p>
    </div>
  </div>

  <div class="overrideGrid">
    <label>
      Airline
      <input id="overrideAirline" list="airlineOptions" placeholder="Search airline" />
    </label>

    <label>
      Program
      <input id="overrideProgram" list="programOptions" placeholder="Search program" />
    </label>

    <label>
      From
      <input id="overrideOrigin" list="airportOptions" placeholder="TPA" />
    </label>

    <label>
      To
      <input id="overrideDestination" list="airportOptions" placeholder="JFK" />
    </label>

    <label>
      Date
      <input id="overrideDate" type="date" />
    </label>

    <label>
      Miles
      <input id="overrideMiles" placeholder="Ex: 10300" />
    </label>

    <label>
      Taxes
      <input id="overrideTaxes" placeholder="Ex: 5.60" />
    </label>

    <label>
      Cash fare
      <input id="overrideCashPrice" placeholder="Cash fare not found" />
    </label>
  </div>

  <button id="recalculateOverride" type="button">
    Recalculate with overrides
  </button>

  <datalist id="airlineOptions"></datalist>
  <datalist id="programOptions"></datalist>
  <datalist id="airportOptions"></datalist>
</section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
